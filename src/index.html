<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="styles.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SolonCode Desktop Community</title>
    </head>

    <body>
        <!-- 启动器页面 -->
        <div id="launcher" class="launcher-container">
            <main class="app-shell">
                <nav class="tab-bar" id="tab-bar">
                    <button class="tab-item active" type="button" data-tab-key="home" onclick="activateHomeTab()">
                        <span class="tab-dot home"></span>
                        <span>首页</span>
                    </button>
                </nav>

                <header class="app-header">
                    <div class="brand-row">
                        <h1>SolonCode Desktop Community</h1>
                    </div>

                    <div class="app-actions" id="app-actions" style="display: none">
                        <div class="status-badge" id="status-badge">
                            <span class="status-dot" id="status-dot"></span>
                            <span id="status-label">检测中</span>
                        </div>
                        <button class="tool-btn tool-install" id="btn-install" onclick="handleInstall()">
                            <span class="tool-icon">↓</span>
                            <span>安装 CLI</span>
                        </button>
                        <button class="tool-btn tool-update" id="btn-update" onclick="handleUpdate()" disabled>
                            <span class="tool-icon">↻</span>
                            <span>更新 CLI</span>
                        </button>
                        <button class="tool-btn tool-uninstall" id="btn-uninstall" onclick="handleUninstall()" disabled>
                            <span class="tool-icon">×</span>
                            <span>卸载 CLI</span>
                        </button>
                    </div>
                </header>

                <div class="home-view" id="home-view">
                    <section class="sidebar">
                        <div class="workspace-header">
                            <div>
                                <span class="workspace-title">工作区</span>
                            </div>
                            <button
                                class="workspace-add"
                                type="button"
                                title="打开工作区"
                                aria-label="打开工作区"
                                onclick="handleOpenWorkspace()"
                            >
                                <span class="workspace-add-icon" aria-hidden="true">
                                    <svg viewBox="0 0 24 24">
                                        <path
                                            d="M3 7.5A2.5 2.5 0 0 1 5.5 5H10l2 2h6.5A2.5 2.5 0 0 1 21 9.5v7A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5z"
                                        />
                                        <path d="M12 11v5" />
                                        <path d="M9.5 13.5h5" />
                                    </svg>
                                </span>
                                <span>打开工作区</span>
                            </button>
                        </div>
                        <div class="workspace-list" id="workspace-list"></div>
                    </section>

                    <section class="main-panel">
                        <div class="run-card">
                            <div>
                                <h2 id="active-workspace-name">用户目录</h2>
                                <p id="active-workspace-path">未指定时默认在用户目录启动</p>
                                <p class="active-port" id="active-workspace-port">尚未启动</p>
                            </div>
                            <div class="button-group" id="button-group" style="display: none">
                                <button class="btn btn-run" id="btn-run" onclick="handleRun()" disabled>
                                    <span class="btn-icon">▶</span>
                                    <span
                                        ><span class="btn-text">运行 SolonCode</span
                                        ><span class="btn-desc">在当前工作区启动 Web 界面</span></span
                                    >
                                </button>
                                <button class="btn btn-stop" id="btn-stop" onclick="handleStop()" disabled>
                                    <span class="btn-icon">■</span>
                                    <span
                                        ><span class="btn-text">停止 SolonCode</span
                                        ><span class="btn-desc">停止当前工作区服务</span></span
                                    >
                                </button>
                            </div>
                        </div>

                        <div class="log-area" id="log-area">
                            <div class="log-header">
                                <span>运行日志</span>
                                <button class="log-clear" onclick="clearLog()">清除</button>
                            </div>
                            <div class="log-content" id="log-content">
                                <div class="log-empty">当前工作区还没有运行日志。</div>
                            </div>
                        </div>
                    </section>

                    <footer class="version-footer" id="version-footer">
                        <span class="version-item" id="cli-version">CLI：检测中</span>
                        <span class="version-item" id="desktop-version">客户端：检测中</span>
                        <button class="footer-link" type="button" onclick="openGitHubPage()">GitHub</button>
                    </footer>
                </div>

                <section class="project-view" id="project-view"></section>
            </main>

            <div class="update-dialog-backdrop" id="update-dialog" hidden>
                <section class="update-dialog" role="dialog" aria-modal="true" aria-labelledby="update-dialog-title">
                    <div>
                        <h2 id="update-dialog-title"></h2>
                        <p id="update-dialog-message"></p>
                    </div>
                    <div class="update-dialog-actions" id="update-dialog-actions"></div>
                </section>
            </div>
        </div>

        <script type="module" src="/main.js"></script>
    </body>
</html>
