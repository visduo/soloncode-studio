<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="assets/xterm/xterm.min.css" />
        <link rel="stylesheet" href="styles.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SolonCode Studio</title>
    </head>

    <body>
        <!-- 启动器页面 -->
        <div id="launcher" class="launcher-container">
            <main class="app-shell">
                <nav class="tab-bar" id="tab-bar">
                    <button class="tab-item active" type="button" data-tab-key="home" onclick="activateHomeTab()">
                        <span class="tab-main">
                            <span class="tab-mode">
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="24"
                                    height="24"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    class="app-icon app-icon-tabHome"
                                    aria-hidden="true">
                                    <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8" />
                                    <path
                                        d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                                </svg>
                            </span>
                            <span class="tab-label">首页</span>
                        </span>
                    </button>
                </nav>

                <div class="home-view" id="home-view">
                    <section class="sidebar">
                        <div class="welcome-brand">
                            <img class="welcome-logo" src="assets/logo.png" alt="" />
                            <span class="welcome-brand-copy">
                                <strong>SolonCode Studio</strong>
                                <small class="welcome-brand-versions">
                                    <span class="version-item" id="cli-version">CLI：检测中</span>
                                    <span class="version-item" id="studio-version">Studio：检测中</span>
                                </small>
                            </span>
                        </div>
                        <div class="welcome-nav">
                            <button class="welcome-nav-item active" type="button">
                                <span class="welcome-nav-icon" data-icon="openFolder" aria-hidden="true"></span>
                                <span>我的工作区</span>
                            </button>
                            <button
                                class="welcome-nav-item"
                                type="button"
                                onclick="openExternalUrl('https://solon.noear.org/article/soloncode')">
                                <span class="welcome-nav-icon" data-icon="website" aria-hidden="true"></span>
                                <span>CLI 文档</span>
                            </button>
                            <button
                                class="welcome-nav-item"
                                type="button"
                                onclick="openExternalUrl('https://soloncode.studio/')">
                                <span class="welcome-nav-icon" data-icon="website" aria-hidden="true"></span>
                                <span>Studio 官网</span>
                            </button>
                            <button
                                class="welcome-nav-item"
                                type="button"
                                onclick="openExternalUrl('https://github.com/visduo/soloncode-studio')">
                                <span class="welcome-nav-icon" data-icon="github" aria-hidden="true"></span>
                                <span>GitHub</span>
                            </button>
                        </div>
                        <div class="sidebar-cli" id="app-actions" style="display: none">
                            <div class="sidebar-cli-actions">
                                <button
                                    class="tool-btn tool-install"
                                    id="btn-install"
                                    onclick="handleCliPrimaryAction()">
                                    <span class="tool-icon" data-icon="install" aria-hidden="true"></span>
                                    <span>安装 CLI</span>
                                </button>
                                <button
                                    class="tool-btn tool-uninstall"
                                    id="btn-uninstall"
                                    onclick="handleUninstall()"
                                    disabled>
                                    <span class="tool-icon" data-icon="close" aria-hidden="true"></span>
                                    <span>卸载 CLI</span>
                                </button>
                            </div>
                        </div>
                    </section>

                    <section class="main-panel">
                        <div class="welcome-toolbar">
                            <label class="workspace-search">
                                <span class="workspace-search-icon" aria-hidden="true">
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="24"
                                        height="24"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <path d="m21 21-4.34-4.34" />
                                        <circle cx="11" cy="11" r="8" />
                                    </svg>
                                </span>
                                <input
                                    id="workspace-search"
                                    type="search"
                                    placeholder="搜索工作区"
                                    autocomplete="off" />
                            </label>
                            <div class="welcome-actions">
                                <div class="app-menu-wrap workspace-add-menu-wrap">
                                    <button
                                        class="welcome-action primary workspace-add-trigger"
                                        id="workspace-add-trigger"
                                        type="button"
                                        aria-haspopup="menu"
                                        aria-expanded="false">
                                        <span
                                            class="workspace-add-icon"
                                            data-icon="addWorkspace"
                                            aria-hidden="true"></span>
                                        <span>添加工作区</span>
                                    </button>
                                    <div class="app-menu workspace-add-menu" id="workspace-add-menu" role="menu" hidden>
                                        <button
                                            class="app-menu-item"
                                            type="button"
                                            role="menuitem"
                                            data-workspace-add="local">
                                            <span
                                                class="app-menu-icon"
                                                data-icon="openFolder"
                                                aria-hidden="true"></span>
                                            <span>本地工作区</span>
                                        </button>
                                        <button
                                            class="app-menu-item"
                                            type="button"
                                            role="menuitem"
                                            data-workspace-add="remote">
                                            <span class="app-menu-icon" aria-hidden="true">
                                                <svg
                                                    xmlns="http://www.w3.org/2000/svg"
                                                    width="24"
                                                    height="24"
                                                    viewBox="0 0 24 24"
                                                    fill="none"
                                                    stroke="currentColor"
                                                    stroke-width="2"
                                                    stroke-linecap="round"
                                                    stroke-linejoin="round"
                                                    class="app-icon lucide lucide-monitor-up-icon lucide-monitor-up">
                                                    <path d="m9 10 3-3 3 3" />
                                                    <path d="M12 13V7" />
                                                    <rect width="20" height="14" x="2" y="3" rx="2" />
                                                    <path d="M12 17v4" />
                                                    <path d="M8 21h8" />
                                                </svg>
                                            </span>
                                            <span>远程工作区</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!--
                        <div class="project-list-heading">
                            <div>
                                <h2>工作区</h2>
                            </div>
                            <div class="active-workspace-summary">
                                <span class="workspace-status-label" id="active-workspace-status">未启动</span>
                            </div>
                        </div>
                        -->
                        <div class="workspace-list" id="workspace-list"></div>
                    </section>
                </div>

                <section class="project-view" id="project-view"></section>
            </main>

            <div class="dialog-backdrop" id="prompt-dialog" hidden>
                <section class="dialog-panel" role="dialog" aria-modal="true" aria-labelledby="prompt-dialog-title">
                    <div>
                        <h2 id="prompt-dialog-title"></h2>
                        <p id="prompt-dialog-message"></p>
                    </div>
                    <div class="dialog-actions" id="prompt-dialog-actions"></div>
                </section>
            </div>

            <div class="dialog-backdrop" id="jdk-install-dialog" hidden>
                <section
                    class="dialog-panel jdk-install-panel"
                    role="dialog"
                    aria-modal="true"
                    aria-labelledby="jdk-install-title">
                    <div>
                        <h2 id="jdk-install-title">缺少 Java 环境</h2>
                        <p id="jdk-install-message"></p>
                    </div>
                    <div class="jdk-install-progress-wrap">
                        <div class="jdk-install-progress-track">
                            <div class="jdk-install-progress-bar" id="jdk-install-progress-bar"></div>
                        </div>
                        <div class="jdk-install-progress-meta">
                            <span id="jdk-install-status">准备下载 JDK</span>
                            <span id="jdk-install-progress-text">0%</span>
                        </div>
                    </div>
                    <div class="dialog-actions">
                        <button class="dialog-btn primary" type="button" id="jdk-install-confirm">一键下载 JDK</button>
                    </div>
                </section>
            </div>

            <div class="dialog-backdrop" id="workspace-alias-dialog" hidden>
                <section class="dialog-panel" role="dialog" aria-modal="true" aria-labelledby="workspace-alias-title">
                    <div>
                        <h2 id="workspace-alias-title">修改工作区名称</h2>
                    </div>
                    <div class="workspace-alias-form">
                        <input
                            class="workspace-alias-input"
                            id="workspace-alias-input"
                            type="text"
                            maxlength="60"
                            placeholder="请输入工作区名称或备注" />
                    </div>
                    <div class="dialog-actions">
                        <button class="dialog-btn" type="button" id="workspace-alias-cancel">取消</button>
                        <button class="dialog-btn primary" type="button" id="workspace-alias-confirm">保存</button>
                    </div>
                </section>
            </div>

            <div class="dialog-backdrop" id="log-dialog" hidden>
                <section
                    class="dialog-panel log-dialog-panel"
                    role="dialog"
                    aria-modal="true"
                    aria-labelledby="log-dialog-title">
                    <div class="log-header">
                        <h2 id="log-dialog-title">运行日志</h2>
                        <div class="log-toolbar">
                            <button class="log-clear" type="button" onclick="clearLog()">清除</button>
                            <button class="dialog-close" type="button" onclick="closeLogDialog()">×</button>
                        </div>
                    </div>
                    <div class="log-content" id="log-content">
                        <div class="log-empty">当前工作区还没有运行日志。</div>
                    </div>
                </section>
            </div>

            <div class="dialog-backdrop" id="web-page-url-dialog" hidden>
                <section class="dialog-panel" role="dialog" aria-modal="true" aria-labelledby="web-page-url-title">
                    <div>
                        <h2 id="web-page-url-title">添加远程工作区</h2>
                    </div>
                    <div class="workspace-alias-form">
                        <input
                            class="workspace-alias-input"
                            id="web-page-url-input"
                            type="url"
                            placeholder="例如：https://example.com"
                            autocomplete="off"
                            spellcheck="false" />
                    </div>
                    <div class="dialog-actions">
                        <button class="dialog-btn" type="button" id="web-page-url-cancel">取消</button>
                        <button class="dialog-btn primary" type="button" id="web-page-url-confirm">添加</button>
                    </div>
                </section>
            </div>

            <div class="dialog-backdrop" id="terminal-settings-dialog" hidden>
                <section
                    class="dialog-panel terminal-settings-panel"
                    role="dialog"
                    aria-modal="true"
                    aria-labelledby="terminal-settings-title">
                    <div>
                        <h2 id="terminal-settings-title">终端设置</h2>
                    </div>
                    <form class="terminal-settings-form" id="terminal-settings-form">
                        <label class="terminal-settings-field terminal-settings-field-wide">
                            <span>字体</span>
                            <input id="terminal-font-family" type="text" autocomplete="off" spellcheck="false" />
                        </label>
                        <label class="terminal-settings-field">
                            <span>字号</span>
                            <input id="terminal-font-size" type="number" min="10" max="24" step="1" />
                        </label>
                        <label class="terminal-settings-field">
                            <span>行高</span>
                            <input id="terminal-line-height" type="number" min="1" max="2" step="0.05" />
                        </label>
                        <label class="terminal-settings-field color-field">
                            <span>背景色</span>
                            <input id="terminal-background" type="color" />
                        </label>
                        <label class="terminal-settings-field color-field">
                            <span>文字色</span>
                            <input id="terminal-foreground" type="color" />
                        </label>
                        <label class="terminal-settings-field color-field">
                            <span>光标色</span>
                            <input id="terminal-cursor" type="color" />
                        </label>
                    </form>
                    <div class="dialog-actions">
                        <button class="dialog-btn" type="button" id="terminal-settings-reset">恢复默认</button>
                        <button class="dialog-btn" type="button" id="terminal-settings-cancel">取消</button>
                        <button class="dialog-btn primary" type="button" id="terminal-settings-save">保存</button>
                    </div>
                </section>
            </div>
        </div>

        <script src="assets/xterm/xterm.js"></script>
        <script src="assets/xterm/xterm-addon-fit.min.js"></script>
        <script src="assets/xterm/addon-webgl.min.js"></script>
        <script type="module" src="/main.js"></script>
    </body>
</html>
