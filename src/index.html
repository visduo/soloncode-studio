<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="styles.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SolonCode Studio</title>
    </head>

    <body>
        <!-- 启动器页面 -->
        <div id="launcher" class="launcher-container">
            <main class="app-shell">
                <nav class="tab-bar" id="tab-bar">
                    <button class="tab-item active" type="button" data-tab-key="home" onclick="activateHomeTab()">
                        <span class="tab-main">
                            <span class="tab-dot home"></span>
                            <span class="tab-label">首页</span>
                        </span>
                    </button>
                </nav>

                <header class="app-header">
                    <div class="brand-row">
                        <h1>SolonCode Studio</h1>
                    </div>

                    <div class="app-actions" id="app-actions" style="display: none">
                        <div class="action-group status-group">
                            <div class="status-badge" id="status-badge" title="运行状态">
                                <span class="status-dot" id="status-dot"></span>
                                <span id="status-label">检测中</span>
                            </div>
                        </div>
                        <div class="action-group cli-group">
                            <button
                                class="tool-btn tool-install"
                                id="btn-install"
                                onclick="handleCliPrimaryAction()"
                                title="安装或更新 SolonCode CLI"
                            >
                                <span class="tool-icon" data-icon="install" aria-hidden="true"></span>
                                <span>安装 CLI</span>
                            </button>
                            <button
                                class="tool-btn tool-uninstall"
                                id="btn-uninstall"
                                onclick="handleUninstall()"
                                title="卸载本机 SolonCode CLI"
                                disabled
                            >
                                <span class="tool-icon" data-icon="close" aria-hidden="true"></span>
                                <span>卸载 CLI</span>
                            </button>
                        </div>
                        <div class="action-group repo-group">
                            <button
                                class="tool-btn tool-website"
                                type="button"
                                onclick="openWebsitePage()"
                                aria-label="打开官网"
                                title="打开 SolonCode 官网"
                            >
                                <span class="tool-icon" data-icon="website" aria-hidden="true"></span>
                                <span>官网</span>
                            </button>
                            <button
                                class="tool-btn tool-github"
                                type="button"
                                onclick="openGitHubPage()"
                                aria-label="打开 GitHub"
                                title="打开 GitHub 仓库"
                            >
                                <span class="tool-icon" data-icon="github" aria-hidden="true"></span>
                                <span>GitHub</span>
                            </button>
                            <!--
                            <button
                                class="tool-btn tool-webpage"
                                type="button"
                                onclick="openWebPage()"
                                aria-label="打开网页"
                                title="输入 URL 并在内置 tab 中打开"
                            >
                                <span class="tool-icon" data-icon="website" aria-hidden="true"></span>
                                <span>打开网页</span>
                            </button>
                            -->
                        </div>
                    </div>
                </header>

                <div class="home-view" id="home-view">
                    <section class="sidebar">
                        <div class="workspace-header">
                            <div>
                                <span class="workspace-title">工作区</span>
                            </div>
                            <button
                                class="workspace-add"
                                type="button"
                                aria-label="打开工作区"
                                onclick="handleOpenWorkspace()"
                            >
                                <span class="workspace-add-icon" data-icon="addWorkspace" aria-hidden="true"></span>
                                <span>打开工作区</span>
                            </button>
                        </div>
                        <div class="workspace-list" id="workspace-list"></div>
                    </section>

                    <section class="main-panel">
                        <div class="workspace-status-bar">
                            <div>
                                <h2 id="active-workspace-name">用户目录</h2>
                                <p id="active-workspace-path">用户目录</p>
                            </div>
                            <div class="workspace-status-actions">
                                <span class="workspace-status-label" id="active-workspace-status">未启动</span>
                            </div>
                        </div>

                        <div class="log-area" id="log-area">
                            <div class="log-header">
                                <span>运行日志</span>
                                <div class="log-toolbar" aria-label="日志工具栏">
                                    <!--
                                    <input
                                        class="log-search"
                                        id="log-search"
                                        type="search"
                                        placeholder="搜索日志"
                                        autocomplete="off"
                                        aria-label="搜索日志"
                                    />
                                    <select class="log-filter" id="log-filter" aria-label="日志类型筛选">
                                        <option value="all">全部</option>
                                        <option value="success">成功</option>
                                        <option value="info">关键信息</option>
                                        <option value="wait">等待</option>
                                        <option value="error">错误</option>
                                    </select>
                                    <label class="log-autoscroll">
                                        <input id="log-autoscroll" type="checkbox" checked />
                                        <span>自动滚动</span>
                                    </label>
                                    -->
                                    <button class="log-clear" type="button" onclick="clearLog()">清除</button>
                                </div>
                            </div>
                            <div class="log-content" id="log-content">
                                <div class="log-empty">当前工作区还没有运行日志。</div>
                            </div>
                        </div>
                    </section>

                    <footer class="version-footer" id="version-footer">
                        <span class="version-item" id="cli-version">CLI：检测中</span>
                        <span class="version-separator" aria-hidden="true">/</span>
                        <span class="version-item" id="studio-version">Studio：检测中</span>
                    </footer>
                </div>

                <section class="project-view" id="project-view"></section>
            </main>

            <div class="dialog-backdrop" id="prompt-dialog" hidden>
                <section class="dialog-panel" role="dialog" aria-modal="true" aria-labelledby="prompt-dialog-title">
                    <div>
                        <h2 id="prompt-dialog-title"></h2>
                        <p id="prompt-dialog-message"></p>
                    </div>
                    <div class="dialog-actions" id="prompt-dialog-actions"></div>
                </section>
            </div>

            <div class="dialog-backdrop" id="workspace-alias-dialog" hidden>
                <section class="dialog-panel" role="dialog" aria-modal="true" aria-labelledby="workspace-alias-title">
                    <div>
                        <h2 id="workspace-alias-title">修改工作区名称</h2>
                        <p id="workspace-alias-message">可以填写一个更容易识别的名称或备注。</p>
                    </div>
                    <div class="workspace-alias-form">
                        <input
                            class="workspace-alias-input"
                            id="workspace-alias-input"
                            type="text"
                            maxlength="60"
                            placeholder="请输入工作区名称或备注"
                        />
                    </div>
                    <div class="dialog-actions">
                        <button class="dialog-btn" type="button" id="workspace-alias-cancel">取消</button>
                        <button class="dialog-btn primary" type="button" id="workspace-alias-confirm">保存</button>
                    </div>
                </section>
            </div>

            <div class="dialog-backdrop" id="web-page-url-dialog" hidden>
                <section class="dialog-panel" role="dialog" aria-modal="true" aria-labelledby="web-page-url-title">
                    <div>
                        <h2 id="web-page-url-title">打开网页</h2>
                        <p id="web-page-url-message">请输入要打开的 URL，确认后会在内置 tab 中以 iframe 方式显示。</p>
                    </div>
                    <div class="workspace-alias-form">
                        <input
                            class="workspace-alias-input"
                            id="web-page-url-input"
                            type="url"
                            placeholder="例如：https://example.com"
                            autocomplete="off"
                            spellcheck="false"
                        />
                    </div>
                    <div class="dialog-actions">
                        <button class="dialog-btn" type="button" id="web-page-url-cancel">取消</button>
                        <button class="dialog-btn primary" type="button" id="web-page-url-confirm">打开</button>
                    </div>
                </section>
            </div>
        </div>

        <script type="module" src="/main.js"></script>
    </body>
</html>
